---

name: "Lint PR Title"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@c7c7c0b6b6c6f4fbbd6c1b2b9f9f7d2c4d8a5b3f # v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
